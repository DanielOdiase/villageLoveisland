<style>
  :root{
    --coral:#FF6F5E; --teal:#0E7C7B; --navy:#173A4E; --gold:#F2B441;
    --sand:#FFF6EC; --lightteal:#E4F4F3; --lightcoral:#FFE7E3; --grey:#3D4C53;
  }
  *{box-sizing:border-box;}
  body,.villee-root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--grey);}
  .villee-root{max-width:520px;margin:0 auto;padding:0 0 40px 0;background:var(--sand);min-height:100%;}
  .vhead{background:var(--navy);color:#fff;padding:18px 20px 16px;text-align:center;position:relative;}
  .vhead h1{margin:0;font-size:15px;letter-spacing:.06em;font-weight:700;color:var(--gold);}
  .vhead h2{margin:4px 0 0;font-size:20px;font-weight:800;}
  .vgoldbar{height:4px;background:var(--gold);}
  .vnav{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:5;}
  .vnav button{flex:1 1 auto;min-width:70px;border:none;background:var(--lightteal);color:var(--teal);font-weight:700;font-size:11.5px;padding:9px 6px;border-radius:8px;cursor:pointer;transition:.15s;}
  .vnav button.active{background:var(--coral);color:#fff;}
  .vpage{padding:20px 18px;}
  .vcard{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(23,58,78,.06);margin-bottom:16px;}
  .vcard h3{margin:0 0 6px;color:var(--navy);font-size:17px;}
  .vcard p.sub{margin:0 0 14px;color:#7d8b91;font-size:13px;line-height:1.4;}
  label{display:block;font-size:12.5px;font-weight:700;color:var(--navy);margin:12px 0 5px;}
  input[type=text],textarea{width:100%;padding:10px 12px;border:1.5px solid #e2e8ea;border-radius:9px;font-size:14px;font-family:inherit;background:#fbfdfd;}
  textarea{min-height:74px;resize:vertical;}
  input[type=text]:focus,textarea:focus{outline:none;border-color:var(--teal);}
  .vbtn{display:inline-block;width:100%;margin-top:16px;background:var(--coral);color:#fff;border:none;padding:13px;border-radius:10px;font-weight:800;font-size:14.5px;cursor:pointer;letter-spacing:.02em;}
  .vbtn:active{transform:scale(.98);}
  .vbtn.secondary{background:var(--teal);}
  .vbtn.ghost{background:transparent;border:1.5px solid var(--teal);color:var(--teal);}
  .vmsg{margin-top:10px;font-size:12.5px;font-weight:700;color:var(--teal);text-align:center;min-height:16px;}
  .vresultrow{margin:10px 0;}
  .vresultrow .vlabel{font-size:12.5px;font-weight:700;color:var(--navy);display:flex;justify-content:space-between;}
  .vbar-bg{background:#eef2f2;border-radius:6px;height:10px;margin-top:4px;overflow:hidden;}
  .vbar-fill{background:linear-gradient(90deg,var(--coral),var(--gold));height:100%;border-radius:6px;}
  .vconf-item{background:var(--lightcoral);border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:14px;color:var(--navy);font-style:italic;position:relative;}
  .vconf-time{display:block;margin-top:4px;font-size:10.5px;color:#a98680;font-style:normal;}
  .vchallenge-box{background:linear-gradient(135deg,var(--teal),#0a5f5e);color:#fff;border-radius:16px;padding:34px 20px;text-align:center;min-height:120px;display:flex;align-items:center;justify-content:center;}
  .vchallenge-box p{font-size:19px;font-weight:800;margin:0;line-height:1.35;}
  .vqr-wrap{text-align:center;padding:6px 0 2px;}
  .vqr-wrap img{width:150px;height:150px;border-radius:10px;border:6px solid #fff;box-shadow:0 2px 10px rgba(23,58,78,.12);}
  .vqr-cap{font-size:11px;color:#8a9aa2;margin-top:8px;}
  .vlinkbox{display:flex;gap:8px;margin-top:10px;}
  .vlinkbox input{flex:1;font-size:12px;}
  .vcopybtn{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:0 14px;font-size:12px;font-weight:700;cursor:pointer;}
  .vpill{display:inline-block;background:var(--gold);color:var(--navy);font-weight:800;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:8px;}
  .vhome-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .vhome-tile{background:#fff;border-radius:14px;padding:18px 10px;text-align:center;box-shadow:0 2px 10px rgba(23,58,78,.06);cursor:pointer;border:2px solid transparent;}
  .vhome-tile:active{border-color:var(--coral);}
  .vhome-tile .emoji{font-size:30px;display:block;margin-bottom:6px;}
  .vhome-tile .lbl{font-size:12.5px;font-weight:800;color:var(--navy);}
  .vempty{color:#a3b0b5;font-size:13px;text-align:center;padding:14px 0;}
  .voptions{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .voption{position:absolute;opacity:0;width:1px;height:1px;}
  .voption-label{display:inline-block;background:#f3f6f6;border:1.5px solid #e2e8ea;border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--navy);cursor:pointer;user-select:none;margin:0;}
  .voption:checked + .voption-label{background:var(--coral);color:#fff;border-color:var(--coral);}
  .voption:focus-visible + .voption-label{outline:2px solid var(--teal);outline-offset:1px;}
  .vother-input{margin:8px 0 0;display:none;}
  .vother-input.show{display:block;}
</style>

<div class="villee-root" id="villeeRoot">
  <div class="vhead">
    <h1>🏝️ THE VILLAGE PRESENTS</h1>
    <h2 id="pageTitle">Love Island Finale Game Night</h2>
  </div>
  <div class="vgoldbar"></div>

  <div class="vnav" id="vnav"></div>
  <div class="vpage" id="vpage"></div>
</div>

  async function sbInsert(table, row){
    try {
      const res = await fetch(`${SUPABASE_REST}/${table}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(row)
      });
      return res.ok;
    } catch(e){ return false; }
  }

  async function sbSelect(table, queryString){
    try {
      const url = `${SUPABASE_REST}/${table}?select=*${queryString||''}`;
      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        }
      });
      if(!res.ok) return [];
      return await res.json();
    } catch(e){ return []; }
  }

  async function sbGetSetting(key){

    return rows.length ? rows[0].value : null;

          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',

      groupRadios.forEach(r => r.addEventListener('change', ()=>{

      }));

    document.getElementById('voteForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const answers = {};
      VOTE_QUESTIONS.forEach(q => {
        let v = (fd.get(q.id)||'').trim();
        if(v === '__other__'){
          const otherEl = document.getElementById(q.id+'_otherText');
          v = otherEl ? otherEl.value.trim() : '';
        }
        answers[q.id] = v || null;
      });
      const hasAny = Object.values(answers).some(v => v);
      const msgEl = document.getElementById('voteMsg');
      if(!hasAny){ msgEl.textContent = "Pick an answer for at least one question first!"; return; }

      else { msgEl.textContent = "Something went wrong, please try again."; }
    });

  async function loadVoteResults(){
    const el = document.getElementById('voteResults');
    if(!el) return;
    el.innerHTML = '<div class="vempty">Loading...</div>';
    const rows = await sbSelect('votes');
    if(rows.length === 0){ el.innerHTML = '<div class="vempty">No votes submitted yet.</div>'; return; }

    let html = '';
    VOTE_QUESTIONS.forEach(q=>{
      const counts = {};
      rows.forEach(row=>{
        const v = row[q.id] ? String(row[q.id]).trim() : '';
        if(v){ const key = v.toLowerCase(); counts[key] = counts[key] || {label:v, n:0}; counts[key].n++; }
      });
      const total = Object.values(counts).reduce((s,c)=>s+c.n,0);
      const top = Object.values(counts).sort((a,b)=>b.n-a.n).slice(0,3);
      html += `<div class="vresultrow"><div class="vlabel"><span>${q.q}</span><span>${total} vote${total===1?'':'s'}</span></div>`;
      if(top.length===0){
        html += `<div class="vempty" style="padding:4px 0;">No answers yet</div>`;
      } else {
        top.forEach(t=>{
          const pct = total ? Math.round((t.n/total)*100) : 0;
          html += `<div style="font-size:12.5px;margin-top:6px;">${t.label} — ${pct}% (${t.n})</div>
                   <div class="vbar-bg"><div class="vbar-fill" style="width:${pct}%;"></div></div>`;
        });
      }
      html += `</div>`;
    });
    el.innerHTML = html;
  }

      const msgEl = document.getElementById('confessMsg');
      const text = ta.value.trim();
      if(!text){ msgEl.textContent = "Type a take first!"; return; }
      msgEl.textContent = "Submitting...";
      const ok = await sbInsert('confessions', {text});
      if(ok){ msgEl.textContent = "Posted anonymously 🌶️"; ta.value=''; loadConfessions(); }
      else { msgEl.textContent = "Something went wrong, please try again."; }
    });

    document.getElementById('refreshConfess').addEventListener('click', loadConfessions);
    loadConfessions();
  }

  async function loadConfessions(){
    const el = document.getElementById('confessList');
    if(!el) return;
    el.innerHTML = '<div class="vempty">Loading...</div>';
    const rows = await sbSelect('confessions', '&order=created_at.desc');
    if(rows.length===0){ el.innerHTML = '<div class="vempty">No confessions yet — be the first!</div>'; return; }
    el.innerHTML = rows.map(c => {
      const d = new Date(c.created_at);
      const time = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      return `<div class="vconf-item">"${escapeHtml(c.text)}"<span class="vconf-time">${time}</span></div>`;
    }).join('');
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ---------------- FIND YOUR MATCH ----------------
  function renderMatch(){
    pageTitleEl.textContent = "💛 Find Your Match";
    pageEl.innerHTML = `
      <div class="vcard">
        <h3>Your mixer challenge</h3>
        <p class="sub">Tap the button, get a random challenge, then go find that person in the room.</p>
        <div class="vchallenge-box"><p id="challengeText">Tap below to get your challenge</p></div>
        <button class="vbtn secondary" id="newChallenge">Get My Challenge</button>
      </div>
    `;
    document.getElementById('newChallenge').addEventListener('click', ()=>{
      const pick = MATCH_CHALLENGES[Math.floor(Math.random()*MATCH_CHALLENGES.length)];
      document.getElementById('challengeText').textContent = pick;
    });
  }

  const DEFAULT_ALBUM_LINK = "https://photos.app.goo.gl/CnsSoEXTDxHM1cEt8";

  // ---------------- PHOTO ALBUM ----------------
  function renderPhotos(){
    pageTitleEl.textContent = "📸 Shared Photo Album";
    pageEl.innerHTML = `
      <div class="vcard">
        <h3>Drop your photos from tonight</h3>
        <p class="sub">Tap below to open tonight's shared album and add your photos. Organizers can update the link here any time — it saves for everyone at the event.</p>
        <label>Shared album link</label>
        <div class="vlinkbox">
          <input type="text" id="albumLink" placeholder="https://photos.app.goo.gl/..." />
          <button class="vcopybtn" id="saveLink">Save</button>
        </div>
        <div class="vmsg" id="albumMsg"></div>
      </div>
      <div class="vcard" id="albumOpenCard" style="display:none;">
        <h3>Tonight's Album</h3>
        <div id="albumQr"></div>
        <a class="vbtn" id="openAlbumBtn" href="#" target="_blank" rel="noopener">Open Photo Album</a>
      </div>
    `;

    document.getElementById('saveLink').addEventListener('click', async ()=>{
      const val = document.getElementById('albumLink').value.trim();
      const msgEl = document.getElementById('albumMsg');
      if(!val){ msgEl.textContent = "Paste the album link first."; return; }
      msgEl.textContent = "Saving...";
      const ok = await sbUpsertSetting('shared_album_link', val);
      if(ok){ msgEl.textContent = "Saved for everyone!"; showAlbum(val); }
      else { msgEl.textContent = "Something went wrong, please try again."; }
    });

    loadAlbum();
  }

  async function loadAlbum(){
    let val = await sbGetSetting('shared_album_link');
    if(!val){
      val = DEFAULT_ALBUM_LINK;
      await sbUpsertSetting('shared_album_link', val);
    }
    document.getElementById('albumLink').value = val;
    showAlbum(val);
  }

  function showAlbum(url){
    const card = document.getElementById('albumOpenCard');
    if(!card) return;
    card.style.display = 'block';
    document.getElementById('openAlbumBtn').href = url;
    document.getElementById('albumQr').innerHTML = qrImg(url, 150);
  }

  // ---------------- ROUTER ----------------
  async function render(tab){
    if(tab === 'host'){
      // Hidden host route: no nav bar shown, keeps it visually separate from guest pages
      navEl.innerHTML = '';
      renderHost();
      return;
    }
    const profile = await ensureGuestProfile();
    if(!profile){ renderRegister(tab); return; }
    renderNav(tab);
    if(tab === 'vote') renderVote();
    else if(tab === 'confess') renderConfess();
    else if(tab === 'match') renderMatch();
    else if(tab === 'photos') renderPhotos();
    else renderHome();
  }

  function getTabFromHash(){
    const h = (window.location.hash || '').replace('#','');
    if(h === 'host') return 'host';
    return TABS.find(t=>t.id===h) ? h : 'home';
  }

  window.addEventListener('hashchange', ()=> render(getTabFromHash()));
  render(getTabFromHash());
})();
</script>
